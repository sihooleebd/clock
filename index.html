<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta id="theme-color-meta" name="theme-color" content="#070b18" />
    <meta
      name="description"
      content="Large 24-hour pixel clock with colors that shift through the day."
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>Pixel Clock</title>
  </head>
  <body>
    <canvas id="sky-layer" aria-hidden="true"></canvas>
    <canvas id="weather-layer" aria-hidden="true"></canvas>
    <main class="app">
      <canvas
        id="clock"
        role="img"
        aria-label="Current time and date in 24 hour format"
      ></canvas>
      <div class="status-line">
        <p id="period-label" class="period-label" aria-live="off">
          <span id="date-label" class="period-date"></span>
          <span class="period-divider" aria-hidden="true">&middot;</span>
          <span id="status-label" class="period-token"></span>
        </p>
      </div>

      <aside
        id="settings-shell"
        class="settings-shell"
        data-open="false"
        aria-label="Appearance settings"
      >
        <button
          id="settings-toggle"
          class="settings-toggle"
          type="button"
          aria-label="Open settings"
          aria-controls="settings-panel"
          aria-expanded="false"
          aria-pressed="false"
          title="Open settings"
        >
          <svg
            class="settings-icon settings-icon-open"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="4" x2="20" y1="6" y2="6"></line>
            <line x1="4" x2="20" y1="12" y2="12"></line>
            <line x1="4" x2="20" y1="18" y2="18"></line>
            <circle cx="9" cy="6" r="2"></circle>
            <circle cx="15" cy="12" r="2"></circle>
            <circle cx="11" cy="18" r="2"></circle>
          </svg>
          <svg
            class="settings-icon settings-icon-close"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="18" x2="6" y1="6" y2="18"></line>
            <line x1="6" x2="18" y1="6" y2="18"></line>
          </svg>
        </button>
        <div id="settings-panel" class="settings-panel" aria-hidden="true">
          <div class="settings-row">
            <span class="settings-key">Variant</span>
            <button
              id="variant-button"
              class="period-button settings-value"
              type="button"
            ></button>
          </div>
          <div class="settings-row">
            <span class="settings-key">Weather</span>
            <button
              id="weather-button"
              class="period-button settings-value"
              type="button"
            ></button>
          </div>
          <div class="settings-row">
            <span class="settings-key">Lock</span>
            <div class="settings-lock-group">
              <button
                id="theme-lock-button"
                class="theme-lock"
                type="button"
                aria-label="Lock color and weather"
                aria-pressed="false"
                title="Lock color and weather"
              >
                <svg
                  class="lock-icon lock-icon-locked"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <svg
                  class="lock-icon lock-icon-unlocked"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 9.5-1"></path>
                </svg>
              </button>
              <span id="lock-state-label" class="lock-state-label" aria-live="off"></span>
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-key">Effects</span>
            <button
              id="cinematic-toggle"
              class="theme-fx settings-fx"
              type="button"
              aria-label="Disable cinematic effects"
              aria-pressed="true"
              title="Disable cinematic effects"
            >
              FX ON
            </button>
          </div>
        </div>
      </aside>
    </main>
    <script src="app.js"></script>
  </body>
</html>
