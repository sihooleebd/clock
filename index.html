<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta id="theme-color-meta" name="theme-color" content="#070b18" />
    <meta
      name="description"
      content="Large 24-hour pixel clock with colors that shift through the day."
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>Pixel Clock</title>
  </head>
  <body>
    <canvas id="weather-layer" aria-hidden="true"></canvas>
    <main class="app">
      <canvas
        id="clock"
        role="img"
        aria-label="Current time and date in 24 hour format"
      ></canvas>
      <div class="status-line">
        <p id="period-label" class="period-label" aria-live="off">
          <span id="date-label" class="period-date"></span>
          <span class="period-divider" aria-hidden="true">&middot;</span>
          <button id="status-button" class="period-button" type="button"></button>
          <span class="period-divider" aria-hidden="true">&middot;</span>
          <button id="variant-button" class="period-button" type="button"></button>
          <span class="period-divider" aria-hidden="true">&middot;</span>
          <button id="weather-button" class="period-button" type="button"></button>
        </p>
        <button
          id="theme-lock-button"
          class="theme-lock"
          type="button"
          aria-label="Unlock theme automation"
          aria-pressed="false"
          title="Unlock theme automation"
        >
          <svg
            class="lock-icon lock-icon-locked"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <svg
            class="lock-icon lock-icon-unlocked"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 9.5-1"></path>
          </svg>
        </button>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
